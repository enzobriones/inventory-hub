version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gosec
    - misspell
    - unconvert
    - unparam
    - gocritic
  settings:
    misspell:
      locale: US
      ignore-rules:
        - inventario
        - producto
        - productos
        - cliente
        - clientes
        - variante
        - variantes
        - catalogo
        - catálogo
        - organizacion
        - organización
        - ubicacion
        - ubicación
        - ubicaciones
        - tienda
        - bodega
        - sucursal
        - consolidada
        - aleatorio
  exclusions:
    paths:
      - migrations

formatters:
  enable:
    - gofmt
    - goimports
